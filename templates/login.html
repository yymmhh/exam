{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<h2>登录</h2>
<form method="post" class="card">
  <p>用户名</p>
  <p><input name="username" required></p>
  <p>密码</p>
  <p><input name="password" type="password" required></p>
  <p><button type="submit">登录</button></p>
  <p class="muted">账号由管理员在后台创建。</p>
</form>
{% endblock %}
